<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad128" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.1)"/>
    </filter>
  </defs>
  
  <!-- Background circle with shadow -->
  <circle cx="64" cy="64" r="56" fill="url(#grad128)" stroke="none" filter="url(#shadow)"/>
  
  <!-- Central hub -->
  <circle cx="64" cy="64" r="8" fill="white"/>
  
  <!-- Connection nodes -->
  <circle cx="64" cy="24" r="6" fill="white" opacity="0.9"/>
  <circle cx="104" cy="64" r="6" fill="white" opacity="0.9"/>
  <circle cx="64" cy="104" r="6" fill="white" opacity="0.9"/>
  <circle cx="24" cy="64" r="6" fill="white" opacity="0.9"/>
  
  <!-- Connection lines -->
  <line x1="64" y1="64" x2="64" y2="24" stroke="white" stroke-width="4" opacity="0.8" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="104" y2="64" stroke="white" stroke-width="4" opacity="0.8" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="64" y2="104" stroke="white" stroke-width="4" opacity="0.8" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="24" y2="64" stroke="white" stroke-width="4" opacity="0.8" stroke-linecap="round"/>
  
  <!-- Subtle inner glow -->
  <circle cx="64" cy="64" r="32" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
</svg>
